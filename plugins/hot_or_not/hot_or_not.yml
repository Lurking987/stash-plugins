name: HotOrNot_V3
description: Adds an ELO based ranking system for performers and images
version: 3.0.0
url: https://github.com/Lurking987/stash-plugins/pull/5
ui: 
  javascript:
    - main.js
    - state.js
    - ui-manager.js
    - constants.js
    - api-client.js
    - gauntlet-selection.js
    - match-handler.js
    - formatters.js
    - parsers.js
    - battle-engine.js
    - math-utils.js
  css:
    - hot_or_not.css
settings:
  showBattleRankBadge:
    displayName: Show Battle Rank Badge
    description: Show a rank badge on individual performer pages. Enabled by default.
    type: BOOLEAN
